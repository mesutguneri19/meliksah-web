<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melihşah Kekeç | Dijital Kimlik</title>
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #38bdf8;
            --card-bg: #1e293b;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .links { display: flex; flex-direction: column; gap: 1rem; }
        .link-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .link-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            background: #273549;
        }
        footer { margin-top: 3rem; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size: 3rem;">🚀</div> 
        <h1>Melihşah Kekeç</h1>
        <p>Mühendis | Müzisyen | Teknoloji Meraklısı</p>
        
        <div class="links">
            <a href="mailto:merhaba@meliksahkekec.com.tr" class="link-card">📧 İletişime Geç</a>
            <a href="#" class="link-card">🎵 Müzik Projeleri</a>
            <a href="https://github.com" class="link-card">💻 GitHub Profilim</a>
            <a href="https://linkedin.com" class="link-card">👔 LinkedIn</a>
        </div>

        <footer>
            © 2026 Melihşah Kekeç. Tüm hakları saklıdır.
        </footer>
    </div>
</body>
</html>
