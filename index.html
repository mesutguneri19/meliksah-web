<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melikşah Kekeç | 3D Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            pointer-events: none; /* Mouse 3D objelere geçsin */
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            pointer-events: all;
        }
        h1 { margin: 0; font-size: 3rem; letter-spacing: 5px; color: #fbbf24; /* FB Sarısı */ }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="glass-card">
            <h1>MELİKŞAH KEKEÇ</h1>
            <p style="color: #60a5fa;">Cloud Engineer & Music Producer</p>
        </div>
    </div>

    <script>
        // 3D Sahne Kurulumu
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Parçacık Oluşturma (Stars/Neural Mesh)
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 5000;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i=0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 10;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const material = new THREE.PointsMaterial({
            size: 0.005,
            color: '#fbbf24'
        });

        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);
        camera.position.z = 2;

        // Mouse Etkileşimi
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Animasyon Döngüsü
        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.001;
            if (mouseX > 0) {
                particlesMesh.rotation.x = mouseY * 0.0001;
                particlesMesh.rotation.y = mouseX * 0.0001;
            }
            renderer.render(scene, camera);
        }
        animate();

        // Pencere Boyutu Güncelleme
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
